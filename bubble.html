<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      height: 100%;
    }
    .bubble {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: linear-gradient(135deg, #4a6cf7, #6b5ce7);
      border-radius: 20px;
      cursor: pointer;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(74, 108, 247, 0.4), 0 2px 8px rgba(0,0,0,0.3);
      transition: all 0.15s ease;
      white-space: nowrap;
      user-select: none;
      -webkit-app-region: no-drag;
      animation: fadeIn 0.2s ease;
    }
    .bubble:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(74, 108, 247, 0.5), 0 3px 12px rgba(0,0,0,0.4);
    }
    .bubble:active {
      transform: scale(0.97);
    }
    .bubble svg {
      width: 14px;
      height: 14px;
      fill: white;
      flex-shrink: 0;
    }
    .close {
      position: absolute;
      top: -4px;
      right: -4px;
      width: 16px;
      height: 16px;
      background: rgba(0,0,0,0.6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .close svg { width: 8px; height: 8px; fill: white; }
    .wrapper { position: relative; display: inline-block; }
    .wrapper:hover .close { opacity: 1; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="bubble" id="bubbleBtn">
      <svg viewBox="0 0 24 24"><path d="M7.5 5.6L10 7 8.6 4.5 10 2 7.5 3.4 5 2l1.4 2.5L5 7zm12 9.8L17 14l1.4 2.5L17 19l2.5-1.4L22 19l-1.4-2.5L22 14zM22 2l-2.5 1.4L17 2l1.4 2.5L17 7l2.5-1.4L22 7l-1.4-2.5zm-7.63 5.29a.9959.9959 0 0 0-1.41 0L1.29 18.96c-.39.39-.39 1.02 0 1.41l2.34 2.34c.39.39 1.02.39 1.41 0L16.7 11.05c.39-.39.39-1.02 0-1.41l-2.33-2.35z"/></svg>
      润色
    </div>
    <div class="close" id="closeBtn">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    document.getElementById('bubbleBtn').addEventListener('click', () => {
      ipcRenderer.send('bubble-clicked');
    });

    document.getElementById('closeBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      ipcRenderer.send('bubble-dismiss');
    });
  </script>
</body>
</html>
