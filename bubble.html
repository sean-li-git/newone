<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bubble {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(99, 102, 241, 0.4), 0 1px 4px rgba(0,0,0,0.2);
      transition: all 0.15s ease;
      user-select: none;
      -webkit-app-region: no-drag;
      animation: fadeIn 0.2s ease;
    }
    .bubble:hover {
      transform: scale(1.12);
      box-shadow: 0 3px 14px rgba(99, 102, 241, 0.5), 0 2px 6px rgba(0,0,0,0.25);
    }
    .bubble:active {
      transform: scale(0.92);
    }
    .bubble svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }
    .wrapper { position: relative; display: inline-block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="bubble" id="bubbleBtn">
      <svg viewBox="0 0 24 24" fill="white"><path d="M7.5 5.6L10 7 8.6 4.5 10 2 7.5 3.4 5 2l1.4 2.5L5 7zm12 9.8L17 14l1.4 2.5L17 19l2.5-1.4L22 19l-1.4-2.5L22 14zm-2.17-6.27l-2.83-2.83a.996.996 0 0 0-1.41 0L2.29 17.1a.996.996 0 0 0 0 1.41l2.83 2.83c.39.39 1.02.39 1.41 0L17.33 10.54c.39-.39.39-1.03 0-1.41z"/></svg>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    document.getElementById('bubbleBtn').addEventListener('click', () => {
      ipcRenderer.send('bubble-clicked');
    });
  </script>
</body>
</html>
