<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>语言润色</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: rgba(22, 22, 35, 0.95);
      --bg-card: #1e1e36;
      --bg-input: #12121f;
      --border: #2e2e50;
      --border-focus: #4a6cf7;
      --text: #e8e8f0;
      --text2: #9898b8;
      --text3: #5a5a7a;
      --accent: #4a6cf7;
      --accent2: #5b7af8;
      --success: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #161623;
      color: var(--text);
      height: 100vh;
      overflow: auto;
      user-select: none;
      margin: 0;
    }

    .app {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    /* 顶栏 */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 10px 80px;
      -webkit-app-region: drag;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-left svg { width: 15px; height: 15px; fill: var(--accent); }
    .header h1 { font-size: 13px; font-weight: 600; }

    .header-right {
      display: flex; align-items: center; gap: 6px;
      -webkit-app-region: no-drag;
    }

    .icon-btn {
      background: none; border: none; cursor: pointer;
      padding: 4px; display: flex; align-items: center;
      color: var(--text3); transition: color 0.2s;
    }
    .icon-btn:hover { color: var(--text); }
    .icon-btn svg { width: 14px; height: 14px; fill: currentColor; }

    .close-btn { display: none; }

    /* 模式切换 */
    .modes {
      display: flex; gap: 3px; padding: 8px 14px;
      background: var(--bg-input); flex-shrink: 0;
      flex-wrap: wrap;
    }

    .mode-btn {
      flex: 1 1 auto; min-width: 0; padding: 5px 6px; border: none;
      background: transparent; color: var(--text3);
      font-size: 10.5px; cursor: pointer; border-radius: 6px;
      transition: all 0.2s; font-family: inherit;
      white-space: nowrap;
    }
    .mode-btn.active { background: var(--accent); color: white; }
    .mode-btn:hover:not(.active) { color: var(--text2); background: var(--border); }

    /* 内容区域 */
    .content {
      flex: 1; display: flex; flex-direction: column;
      padding: 10px 14px; gap: 8px; min-height: 0;
    }

    .label {
      font-size: 10px; color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px;
      display: flex; justify-content: space-between;
    }

    /* 原文区（悬浮模式简短显示，手动模式可编辑） */
    .original-box {
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      font-size: 12px; line-height: 1.6; color: var(--text2);
      max-height: 60px; overflow-y: auto;
      white-space: pre-wrap; word-break: break-word;
    }

    .input-area {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 10px; color: var(--text); font-size: 13px;
      line-height: 1.6; resize: none; outline: none;
      font-family: inherit; transition: border-color 0.2s;
      min-height: 80px;
    }
    .input-area:focus { border-color: var(--border-focus); }
    .input-area::placeholder { color: var(--text3); }

    /* 结果区域 */
    .result-box {
      flex: 1; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 13px; line-height: 1.7;
      overflow-y: auto; white-space: pre-wrap; word-break: break-word;
      min-height: 80px;
      color: var(--text); font-family: inherit;
      outline: none; resize: none;
      transition: border-color 0.2s;
    }
    .result-box:focus { border-color: var(--border-focus); }
    .result-box::placeholder { color: var(--text3); }

    .result-box.loading {
      display: flex; align-items: center; justify-content: center;
      color: var(--text3);
    }

    .loading-anim {
      display: flex; align-items: center; gap: 8px; font-size: 12px;
    }

    .dots { display: flex; gap: 3px; }
    .dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(1) { animation-delay: -0.3s; }
    .dots span:nth-child(2) { animation-delay: -0.15s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.4); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .error-text { color: var(--danger); font-size: 12px; }

    /* 底部操作栏 */
    .actions {
      display: flex; gap: 6px; padding: 8px 14px 12px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }

    .btn {
      flex: 1; padding: 8px 0; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn svg { width: 13px; height: 13px; fill: currentColor; }

    .btn-adopt {
      background: var(--success); color: white;
    }
    .btn-adopt:hover { filter: brightness(1.1); }
    .btn-adopt:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-copy {
      background: var(--accent); color: white;
    }
    .btn-copy:hover { filter: brightness(1.1); }
    .btn-copy:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-regen {
      background: var(--bg-card); color: var(--text2); border: 1px solid var(--border);
    }
    .btn-regen:hover { border-color: var(--text3); color: var(--text); }
    .btn-regen:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-dismiss {
      background: transparent; color: var(--text3); border: 1px solid var(--border);
      max-width: 70px;
    }
    .btn-dismiss:hover { color: var(--text2); border-color: var(--text3); }

    .btn-polish {
      background: var(--accent); color: white;
    }
    .btn-polish:hover { filter: brightness(1.1); }

    /* Toast */
    .toast {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--success); color: white;
      padding: 6px 16px; border-radius: 6px;
      font-size: 12px; font-weight: 500;
      opacity: 0; transition: all 0.25s; z-index: 100;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 设置面板 */
    .settings-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 50;
    }
    .settings-overlay.show { display: flex; align-items: center; justify-content: center; }

    .settings-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; width: 94%; max-width: 480px;
    }

    .settings-box h3 { font-size: 13px; margin-bottom: 10px; }

    .presets {
      display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap;
    }

    .preset {
      padding: 3px 10px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-size: 10px;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .preset:hover, .preset.active {
      border-color: var(--accent); color: var(--accent);
    }

    .field { margin-bottom: 8px; }
    .field label {
      display: block; font-size: 10px; color: var(--text3);
      margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px;
    }

    .field input {
      width: 100%; padding: 6px 8px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 12px; outline: none;
      font-family: monospace;
    }
    .field input:focus { border-color: var(--border-focus); }

    .settings-btns {
      display: flex; gap: 6px; margin-top: 10px;
    }
    .settings-btns .btn { font-size: 11px; padding: 6px 0; }

    .hint { font-size: 10px; color: var(--text3); margin-top: 6px; }
    .hint.accent { color: var(--accent); font-style: normal; }

    /* 设置面板 Tab */
    .settings-tabs {
      display: flex; gap: 0; margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .settings-tab {
      flex: 1; padding: 6px 0; background: none; border: none;
      color: var(--text3); font-size: 11px; cursor: pointer;
      font-family: inherit; border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .settings-tab.active {
      color: var(--accent); border-bottom-color: var(--accent);
    }
    .settings-tab:hover:not(.active) { color: var(--text2); }

    .settings-tab-content { display: none; }
    .settings-tab-content.active { display: block; }

    /* Prompt 编辑面板 */
    .prompt-mode-tabs {
      display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;
    }
    .prompt-mode-tab {
      padding: 3px 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text3); font-size: 10px;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .prompt-mode-tab.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(74,108,247,0.1);
    }
    .prompt-mode-tab:hover:not(.active) { color: var(--text2); border-color: var(--text3); }

    .prompt-textarea {
      width: 100%; min-height: 160px; max-height: 280px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px; color: var(--text);
      font-size: 11px; line-height: 1.5; resize: vertical;
      outline: none; font-family: inherit;
    }
    .prompt-textarea:focus { border-color: var(--border-focus); }
    .prompt-textarea::placeholder { color: var(--text3); }

    .prompt-actions {
      display: flex; gap: 6px; margin-top: 6px; justify-content: flex-end;
    }
    .prompt-actions button {
      padding: 4px 10px; border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--text2); font-size: 10px;
      cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .prompt-actions button:hover { border-color: var(--text3); color: var(--text); }
    .prompt-actions .btn-reset { color: var(--danger); border-color: var(--danger); }
    .prompt-actions .btn-reset:hover { background: rgba(239,68,68,0.1); }

    /* 历史记录面板 */
    .history-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 50;
    }
    .history-overlay.show { display: flex; align-items: center; justify-content: center; }

    .history-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; width: 92%; max-width: 440px;
      max-height: 80vh; display: flex; flex-direction: column;
    }
    .history-box h3 { font-size: 13px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .history-box h3 span { font-size: 10px; color: var(--text3); font-weight: normal; }

    .history-list {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
    }
    .history-empty {
      text-align: center; color: var(--text3); font-size: 12px; padding: 24px 0;
    }
    .history-item {
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 11px;
      position: relative;
    }
    .history-item.starred { border-color: var(--warn); }
    .history-item .hi-mode {
      font-size: 9px; color: var(--accent); background: rgba(74,108,247,0.15);
      padding: 1px 6px; border-radius: 3px; margin-right: 4px;
    }
    .history-item .hi-time { font-size: 9px; color: var(--text3); }
    .history-item .hi-original {
      color: var(--text3); margin-top: 4px; line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-item .hi-result {
      color: var(--text); margin-top: 3px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .history-item .hi-actions {
      position: absolute; top: 6px; right: 6px; display: flex; gap: 4px;
    }
    .history-item .hi-actions button {
      background: none; border: none; cursor: pointer; padding: 2px;
      color: var(--text3); font-size: 12px; line-height: 1;
    }
    .history-item .hi-actions button:hover { color: var(--text); }
    .history-item .hi-actions .star-btn.active { color: var(--warn); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
<div class="app">
  <!-- 顶栏 -->
  <div class="header">
    <div class="header-left">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      <h1>语言润色</h1>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="historyBtn" title="润色记录">
        <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="API 设置">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
      <button class="close-btn" id="closeBtn"></button>
    </div>
  </div>

  <!-- 模式切换 -->
  <div class="modes">
    <button class="mode-btn active" data-mode="formal">正式汇报</button>
    <button class="mode-btn" data-mode="concise">精简提炼</button>
    <button class="mode-btn" data-mode="email">邮件格式</button>
    <button class="mode-btn" data-mode="bullet">要点列表</button>
    <button class="mode-btn" data-mode="zh2en">中译英</button>
    <button class="mode-btn" data-mode="enpolish">英文润色</button>
  </div>

  <!-- 内容 -->
  <div class="content">
    <!-- 悬浮模式：显示原文摘要 -->
    <div id="floatOriginal" class="hidden">
      <div class="label"><span>原文</span></div>
      <div class="original-box" id="originalBox"></div>
    </div>

    <!-- 手动输入模式 -->
    <div id="inputMode" style="display:block">
      <div class="label"><span>输入要润色的文字</span><span id="charCount">0 字</span></div>
      <textarea class="input-area" id="inputArea" placeholder="在这里输入文字，然后点击润色...&#10;&#10;💡 更快捷：在微信中选中文字后按 ⌘⇧P 自动润色"></textarea>
    </div>

    <!-- 结果区域 -->
    <div id="resultWrap" style="display:none;flex:1;flex-direction:column;min-height:0;">
      <div class="label" style="margin-bottom:4px"><span>润色结果</span><span style="font-size:9px;color:var(--text3)">可直接编辑</span><span id="resultCount"></span></div>
      <textarea class="result-box" id="resultBox" placeholder="润色结果将显示在这里，你可以直接编辑后再采纳"></textarea>
    </div>
  </div>

  <!-- 操作栏 -->
  <div class="actions" id="actionsBar">
    <!-- 手动输入模式的按钮 -->
    <div id="inputActions" style="display:flex;gap:6px;width:100%">
      <button class="btn btn-dismiss" id="dismissBtn1">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <button class="btn btn-polish" id="polishBtn">
        <svg viewBox="0 0 24 24"><path d="M7.5 5.6L10 7 8.6 4.5 10 2 7.5 3.4 5 2l1.4 2.5L5 7zm12 9.8L17 14l1.4 2.5L17 19l2.5-1.4L22 19l-1.4-2.5L22 14zM22 2l-2.5 1.4L17 2l1.4 2.5L17 7l2.5-1.4L22 7l-1.4-2.5zm-7.63 5.29a.9959.9959 0 0 0-1.41 0L1.29 18.96c-.39.39-.39 1.02 0 1.41l2.34 2.34c.39.39 1.02.39 1.41 0L16.7 11.05c.39-.39.39-1.02 0-1.41l-2.33-2.35z"/></svg>
        开始润色
      </button>
    </div>

    <!-- 结果模式的按钮 -->
    <div id="resultActions" style="display:none;gap:6px;width:100%">
      <button class="btn btn-dismiss" id="dismissBtn2">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <button class="btn btn-regen" id="regenBtn" disabled>
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        重新生成
      </button>
      <button class="btn btn-copy" id="copyBtn" disabled>
        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        复制
      </button>
      <button class="btn btn-adopt" id="adoptBtn" disabled>
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        采纳替换
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 设置面板 -->
<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-box">
    <h3>设置</h3>
    <div class="settings-tabs">
      <button class="settings-tab active" data-tab="api">API 配置</button>
      <button class="settings-tab" data-tab="prompt">Prompt 模板</button>
    </div>

    <!-- Tab 1: API 设置 -->
    <div class="settings-tab-content active" id="tabApi">
      <p class="hint accent" style="margin-bottom:8px">已默认配置 DeepSeek，只需填写 API Key</p>
      <div class="presets">
        <button class="preset" data-provider="deepseek">DeepSeek</button>
        <button class="preset" data-provider="openai">OpenAI</button>
        <button class="preset" data-provider="zhipu">智谱 AI</button>
        <button class="preset" data-provider="moonshot">Moonshot</button>
        <button class="preset" data-provider="qwen">通义千问</button>
        <button class="preset" data-provider="kimi">Kimi</button>
      </div>
      <div class="field">
        <label>API 地址</label>
        <input type="text" id="apiUrl" placeholder="https://api.deepseek.com/chat/completions">
      </div>
      <div class="field">
        <label>API Key（必填）</label>
        <input type="password" id="apiKey" placeholder="在 platform.deepseek.com 获取">
      </div>
      <div class="field">
        <label>模型</label>
        <input type="text" id="modelName" placeholder="deepseek-chat">
      </div>
      <p class="hint">设置保存在本地，API Key 不会上传到任何地方</p>
    </div>

    <!-- Tab 2: Prompt 模板 -->
    <div class="settings-tab-content" id="tabPrompt">

const modePrompts = {

// 用户自定义 Prompt 存储（通过主进程文件系统）
let _cachedCustomPrompts = {};
let _cachedSettings = {};

async function initSettingsCache() {
  _cachedSettings = await ipcRenderer.invoke('get-settings') || {};
  _cachedCustomPrompts = await ipcRenderer.invoke('get-custom-prompts') || {};
}

function loadCustomPrompts() {

}

// 获取实际使用的 Prompt（优先使用用户自定义）
function getActivePrompt(mode) {
  const custom = _cachedCustomPrompts;
  if (custom[mode] && custom[mode].trim()) return custom[mode];
  return modePrompts[mode];
}

function getCachedSettings() {
  return { ...defaultSettings, ..._cachedSettings };
}

function saveCachedSettings(settings) {

}

// ========== UI 切换 ==========

function savePolishRecord() {

// 快捷键
document.addEventListener('keydown', (e) => {

// ========== 润色逻辑 ==========

async function doPolish(text) {
  if (isPolishing) return;

  const settings = getCachedSettings();

  if (!settings.apiKey) {
    showToast('请先设置 API Key');
    document.getElementById('settingsOverlay').classList.add('show');
    return;
  }

  isPolishing = true;
  currentResult = '';
  adoptBtn.disabled = true;
  copyBtn.disabled = true;
  regenBtn.disabled = true;

  resultBox.className = 'result-box';
  resultBox.value = '';
  resultBox.disabled = true;
  resultBox.placeholder = '正在润色...';
  resultCount.textContent = '';

  try {
    const result = await callAPI(text, settings);
    currentResult = result;
    resultBox.className = 'result-box';
    resultBox.value = result;
    resultBox.disabled = false;
    resultBox.placeholder = '';
    resultCount.textContent = `${result.length} 字`;
    adoptBtn.disabled = false;
    copyBtn.disabled = false;
  } catch (err) {
    resultBox.className = 'result-box';
    resultBox.value = '';
    resultBox.disabled = true;
    resultBox.placeholder = `润色失败: ${err.message}`;
  } finally {
    isPolishing = false;
    regenBtn.disabled = false;
  }
}

// 从历史记录中获取 few-shot examples
async function getExamplesForPrompt(mode) {
  try {
    const history = await ipcRenderer.invoke('get-polish-history');
    if (!history || history.length === 0) return '';

    // 优先选加星的，再选同模式最近的
    const sameMode = history.filter(h => h.mode === mode);
    const starred = sameMode.filter(h => h.starred);
    const recent = sameMode.filter(h => !h.starred).slice(-5);

    // 加星优先取2条，剩余从最近的补到3条
    const picks = [];
    starred.slice(-2).forEach(h => picks.push(h));
    for (const h of recent.reverse()) {
      if (picks.length >= 3) break;
      if (!picks.find(p => p.timestamp === h.timestamp)) picks.push(h);
    }

    if (picks.length === 0) return '';

    let text = '\n\n以下是用户之前满意的润色示例，请参考其风格偏好：';
    picks.forEach((h, i) => {
      const orig = h.original.length > 80 ? h.original.substring(0, 80) + '...' : h.original;
      const res = h.result.length > 120 ? h.result.substring(0, 120) + '...' : h.result;
      text += `\n\n示例${i + 1}：\n原文：${orig}\n润色：${res}`;
    });
    return text;
  } catch (e) {
    return '';
  }
}

async function callAPI(text, settings) {
  // 获取 few-shot examples 并注入 prompt
  const examples = await getExamplesForPrompt(currentMode);
  const systemPrompt = getActivePrompt(currentMode).replace('{{EXAMPLES}}', examples);

  // 根据模式调整 user message
  let userMsg;
  if (currentMode === 'zh2en') {
    userMsg = `Please translate the following Chinese text into professional English (do NOT answer the content, only translate):\n\n「${text}」`;
  } else if (currentMode === 'enpolish') {
    userMsg = `Please polish the following English text to be more professional and expressive (do NOT answer the content, only polish):\n\n「${text}」`;
  } else {
    userMsg = `请润色以下原文（注意：不要回答原文内容，只做文字润色）：\n\n「${text}」`;
  }

  const body = {
    model: settings.model,
    messages: [
      { role: 'system', content: systemPrompt },
      { role: 'user', content: userMsg },
    ],
    temperature: 0.3,
    max_tokens: 2048,
  };

  const resp = await fetch(settings.apiUrl, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${settings.apiKey}`,
    },
    body: JSON.stringify(body),
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error(`API ${resp.status}: ${errText.substring(0, 100)}`);
  }

  const data = await resp.json();
  if (data.choices?.[0]?.message?.content) {
    return data.choices[0].message.content.trim();
  }
  throw new Error('返回数据格式异常');
}

  document.getElementById('settingsOverlay').classList.remove('show');
});

document.getElementById('settingsSave').addEventListener('click', () => {

  const settings = {
    apiUrl: document.getElementById('apiUrl').value.trim() || defaultSettings.apiUrl,
    apiKey: document.getElementById('apiKey').value.trim(),
    model: document.getElementById('modelName').value.trim() || defaultSettings.model,
  };

  // 保存当前编辑中的 Prompt
  const editorVal = document.getElementById('promptEditor').value;

  if (editorVal.trim() && editorVal.trim() !== modePrompts[currentPromptMode]) {
    custom[currentPromptMode] = editorVal;

    delete custom[currentPromptMode]; // 与默认相同则删除自定义
  }
  saveCustomPrompts(custom);

  document.getElementById('settingsOverlay').classList.remove('show');

});

const modeLabels = { formal: '正式汇报', concise: '精简提炼', email: '邮件格式', bullet: '要点列表', zh2en: '中译英', enpolish: '英文润色' };

async function renderHistoryList() {
  const list = document.getElementById('historyList');
  try {
    const history = await ipcRenderer.invoke('get-polish-history');
    if (!history || history.length === 0) {
      list.innerHTML = '<div class="history-empty">暂无记录，采纳润色结果后会自动保存</div>';
      return;
    }

    // 按时间倒序
    const sorted = [...history].reverse();
    list.innerHTML = sorted.map(h => {
      const date = new Date(h.timestamp);
      const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2,'0')}`;
      return `<div class="history-item${h.starred ? ' starred' : ''}" data-ts="${h.timestamp}">
        <div class="hi-actions">
          <button class="star-btn${h.starred ? ' active' : ''}" data-action="star" title="${h.starred ? '取消标记' : '标记为典型示例'}">&#9733;</button>
          <button data-action="delete" title="删除">&#10005;</button>
        </div>
        <span class="hi-mode">${modeLabels[h.mode] || h.mode}</span>
        <span class="hi-time">${timeStr}</span>
        <div class="hi-original">原文：${escapeHtml(h.original)}</div>
        <div class="hi-result">润色：${escapeHtml(h.result)}</div>
      </div>`;
    }).join('');

    // 绑定事件
    list.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const item = btn.closest('.history-item');
        const ts = parseInt(item.dataset.ts);
        if (btn.dataset.action === 'star') {
          ipcRenderer.send('toggle-star-history', ts);
          setTimeout(() => renderHistoryList(), 100);
        } else if (btn.dataset.action === 'delete') {
          ipcRenderer.send('delete-polish-history', ts);
          setTimeout(() => renderHistoryList(), 100);
        }
      });
    });
  } catch (e) {
    list.innerHTML = '<div class="history-empty">加载失败</div>';
  }
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ========== 初始化 ==========
(async () => {
  await initSettingsCache();
  loadSettings();
  showInputUI();
  // 通知主进程：渲染进程已完成初始化
  ipcRenderer.send('renderer-ready');
})();
</script>
</body>
</html>
